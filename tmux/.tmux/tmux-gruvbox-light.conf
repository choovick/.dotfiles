## COLORSCHEME: gruvbox light (Ghostty-aligned)
#
# Use the same Gruvbox Light RGB palette Ghostty ships with.

set-option -g status "on"

# default statusbar colors
set-option -g status-style bg=#ebdbb2,fg=#3c3836

# default window title colors
set-window-option -g window-status-style bg=#bdae93,fg=#504945

# default window with an activity alert
set-window-option -g window-status-activity-style bg=#ebdbb2,fg=#9d0006

# active window title colors
set-window-option -g window-status-current-style bg=#d79921,fg=#fbf1c7

# pane border
set-option -g pane-active-border-style fg=#458588
set-option -g pane-border-style fg=#bdae93

# message infos (visible while writing command)
set-option -g message-style bg=#3c3836,fg=#fbf1c7

# writing commands inactive
set-option -g message-command-style bg=#d79921,fg=#fbf1c7

# pane number display
set-option -g display-panes-active-colour '#458588'
set-option -g display-panes-colour '#bdae93'

# clock
set-window-option -g clock-mode-colour '#b57614'

# bell
set-window-option -g window-status-bell-style bg=#cc241d,fg=#fbf1c7

## Theme settings mixed with colors (unfortunately, but there is no cleaner way)
set-option -g status-justify "left"
set-option -g status-left-style none
set-option -g status-left-length "80"
set-option -g status-right-style none
set-option -g status-right-length "80"
set-window-option -g window-status-separator ""

set-option -g status-left "#[bg=#7c6f64,fg=#fbf1c7,bold] #S #[bg=#ebdbb2,fg=#7c6f64,nobold,noitalics,nounderscore]"
set-option -g status-right "#[bg=#ebdbb2,fg=#7c6f64,nobold,nounderscore,noitalics]#[bg=#7c6f64,fg=#fbf1c7] %Y-%m-%d  %H:%M #[fg=#d79921]#{weather} #{tmux_mode_indicator}"

set-window-option -g window-status-current-format "#[bg=#d79921,fg=#ebdbb2,nobold,noitalics,nounderscore]#[bg=#d79921,fg=#fbf1c7] #I #[bg=#d79921,fg=#fbf1c7,bold] #W#{?window_zoomed_flag,*Z,} #[bg=#ebdbb2,fg=#d79921,nobold,noitalics,nounderscore]"
set-window-option -g window-status-format "#[bg=#d5c4a1,fg=#ebdbb2,noitalics]#[bg=#d5c4a1,fg=#665c54] #I #[bg=#d5c4a1,fg=#665c54] #W #[bg=#ebdbb2,fg=#d5c4a1,noitalics]"

# for non active tmux window
set-window-option -g window-style bg=#d5c4a1
# keep the active pane on the terminal background while inactive panes fade softly
set-window-option -g window-active-style bg=terminal,fg=default

# Initialize TMUX plugin manager for dark-notify trigger to make plugins work with dark/light themes
run '~/.tmux/plugins/tpm/tpm'
